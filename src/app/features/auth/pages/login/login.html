<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-100 to-slate-100 p-5">

  <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-lg">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-600 mb-2">
        Iniciar Sesión
      </h1>
      <p class="text-gray-500">
        Bienvenido de nuevo
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- EMAIL -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Correo electrónico o Username
        </label>

        <input
          type="email"
          id="email"
          placeholder="correo@ejemplo.com"
          formControlName="userOrEmail"
          class="w-full h-12 px-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-200 focus:border-blue-500 transition"/>

        <small
          *ngIf="loginForm.get('userOrEmail')?.touched && loginForm.get('userOrEmail')?.errors?.['required']"
          class="text-red-500 text-sm block mt-2"
        >
          El correo es obligatorio
        </small>

        <small
          *ngIf="loginForm.get('userOrEmail')?.touched && loginForm.get('userOrEmail')?.errors?.['email']"
          class="text-red-500 text-sm block mt-2"
        >
          Formato de correo inválido
        </small>
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="block mb-2 text-sm font-semibold text-gray-700">
          Contraseña
        </label>

        <input
          type="password"
          id="password"
          placeholder="Ingresa tu contraseña"
          formControlName="password"
          class="w-full h-12 px-4 border border-gray-300 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-200 focus:border-blue-500 transition"
        />

        <small
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
          class="text-red-500 text-sm block mt-2"
        >
          La contraseña es obligatoria
        </small>

        <small
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']"
          class="text-red-500 text-sm block mt-2"
        >
          Mínimo 6 caracteres
        </small>
      </div>

      <!-- ERROR DEL BACKEND -->
      <div
        *ngIf="errorMessage"
        class="text-center text-red-600 text-sm font-medium"
      >
        {{ errorMessage ()}}
      </div>

      <!-- BOTÓN -->
      <button
        type="submit"
        [disabled]="loading || loginForm.invalid"
        class="w-full h-12 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span *ngIf="loading">Ingresando...</span>
        <span *ngIf="!loading">Iniciar Sesión</span>
      </button>

    </form>

  </div>

</div>
